name: DHDR Daily Report

on:
workflow_dispatch:

schedule:
- cron: '5 0 * * *'

jobs:
report:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - run: pip install -r requirements.txt

  - run: python report.py
    env:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
```
